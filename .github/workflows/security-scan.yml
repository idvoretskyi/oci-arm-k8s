name: Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC

# Opt into Node.js 24 for all actions ahead of the June 2026 forced migration.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  security-events: write  # Required for uploading SARIF results
  pull-requests: write    # Allow commenting on PRs

jobs:

  trivy:
    name: Trivy Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Trivy (IaC / misconfiguration scan)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy.sarif
          exit-code: '0'          # never fail the job; alerts surface via SARIF
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy.sarif
          category: trivy

  terrascan:
    name: Terrascan Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Terrascan
        run: |
          TERRASCAN_VERSION="v1.19.1"
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y jq
          fi
          curl -L "$(curl -s "https://api.github.com/repos/tenable/terrascan/releases/tags/${TERRASCAN_VERSION}" \
            | jq -r '.assets[] | select(.name | test("Linux_x86_64.tar.gz$")) | .browser_download_url')" \
            -o terrascan.tar.gz
          tar -xf terrascan.tar.gz terrascan
          sudo mv terrascan /usr/local/bin/
          rm terrascan.tar.gz

      - name: Verify Terrascan
        run: terrascan version

      - name: Run Terrascan
        # Terrascan uses the same HCL parser for Terraform and OpenTofu.
        run: terrascan scan -d . -o sarif --output-file terrascan.sarif -v || true

      - name: Create fallback SARIF if missing
        run: |
          if [ ! -f terrascan.sarif ]; then
            printf '{"$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json","version":"2.1.0","runs":[{"tool":{"driver":{"name":"terrascan","version":"fallback"}},"results":[]}]}' \
              > terrascan.sarif
          fi

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: terrascan.sarif
          category: terrascan
